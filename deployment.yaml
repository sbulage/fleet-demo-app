apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: fleet-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
        version: v2.0.0
    spec:
      containers:
      - name: web
        image: httpd:2.4  # Changed from nginx to apache
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: fleet-demo
spec:
  type: ClusterIP
  selector:
    app: demo
  ports:
  - port: 80
    targetPort: 80
